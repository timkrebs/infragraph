name: Release

# Triggered by pushing a semantic version tag: v0.1.0, v1.0.0-rc.1, etc.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create GitHub Releases & upload assets
  packages: write   # push to ghcr.io
  id-token: write   # optional: for signing artifacts

jobs:
  # ───────────────────────────────────────────────────────────────────
  # 1. Run the full test suite before releasing.
  # ───────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -race -count=1 -timeout 120s ./...

  # ───────────────────────────────────────────────────────────────────
  # 2. Build binaries, archives, checksums, Docker images, and
  #    publish the GitHub Release — all via GoReleaser.
  # ───────────────────────────────────────────────────────────────────
  release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up QEMU (cross-compile ARM)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────────────────────────────────────────────────────
  # 3. Verify the release artifacts are downloadable.
  #    Mirrors Vault's post-release smoke test.
  # ───────────────────────────────────────────────────────────────────
  verify:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download and verify checksums
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          BASE="https://github.com/timkrebs/infragraph/releases/download/v${TAG}"
          
          echo "Downloading checksums..."
          curl -fsSLO "${BASE}/infragraph_${TAG}_SHA256SUMS"
          
          echo "Downloading linux/amd64 archive..."
          curl -fsSLO "${BASE}/infragraph_${TAG}_linux_amd64.tar.gz"
          
          echo "Verifying checksum..."
          sha256sum -c infragraph_${TAG}_SHA256SUMS --ignore-missing
          
          echo "Extracting and running version check..."
          tar xzf infragraph_${TAG}_linux_amd64.tar.gz
          ./infragraph version --json

      - name: Verify Docker image
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          docker pull ghcr.io/timkrebs/infragraph:${TAG}
          docker run --rm ghcr.io/timkrebs/infragraph:${TAG} version --json
